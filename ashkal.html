    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #a8ff78 0%, #78ffd6 100%);
            user-select: none;
            -webkit-user-select: none;
        }
        .bounce-active:active {
            transform: scale(0.95);
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-effect {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes pulse-slow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        .pulse-card {
            animation: pulse-slow 2s infinite ease-in-out;
        }
    </style>
</head>

        // حالة اللعبة الحالية
        let score = 0;
        let timeLeft = 30; // مدة اللعبة بالثواني
        let timerId = null;
        let currentTargetItem = null;
        let options = [];
        let canClick = true;

        // مراجع واجهة المستخدم
        const startScreen = document.getElementById('start-screen');
        const resultScreen = document.getElementById('result-screen');
        const startBtn = document.getElementById('start-btn');

        const timerDisplay = document.getElementById('timer-display');
        const scoreDisplay = document.getElementById('score-display');
        const targetSvgContainer = document.getElementById('target-svg-container');
        const actionToast = document.getElementById('action-toast');
        const finalScore = document.getElementById('final-score');
        const feedbackBadge = document.getElementById('feedback-badge');
        const feedbackEmoji = document.getElementById('feedback-emoji');
        const feedbackText = document.getElementById('feedback-text');

        // مراجع كروت الخيارات
        const optionButtons = [
            document.getElementById('option-0'),
            document.getElementById('option-1')
        ];
        const optionSvgs = [
            document.getElementById('option-svg-0'),
            document.getElementById('option-svg-1')
        ];

        // نغمة نجاح أو خطأ مبهجة وبسيطة باستخدام الـ Web Audio API دون ملفات خارجية لتعمل في كل الظروف
        function playInteractiveSound(type) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                if (type === 'correct') {
                    // نغمة النجاح المبهجة
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                    oscillator.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                    oscillator.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
                    gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.4);
                } else if (type === 'wrong') {
                    // نغمة الخطأ الناعمة والمشجعة للتجربة مجدداً
                    oscillator.type = 'sawtooth';
                    oscillator.frequency.setValueAtTime(220, audioCtx.currentTime); // A3
                    oscillator.frequency.setValueAtTime(147, audioCtx.currentTime + 0.15); // D3
                    gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.45);
                    oscillator.start();
                    oscillator.stop(audioCtx.currentTime + 0.45);
                }
            } catch (e) {
                console.log("Audio API is not supported on this browser.");
            }
        }

        // بدء اللعبة
        function startGame() {
            score = 0;
            timeLeft = 30;
            canClick = true;
            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;
            
            // إخفاء الشاشات الإضافية والبدء
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            
            // تشغيل مؤقت اللعبة
            if (timerId) clearInterval(timerId);
            timerId = setInterval(updateTimer, 1000);
            
            // توليد الجولة الأولى
            generateNewRound();
        }

        // تحديث عداد الوقت
        function updateTimer() {
            timeLeft--;
            timerDisplay.textContent = timeLeft;
            
            if (timeLeft <= 0) {
                endGame();
            }
        }

        // توليد جولة جديدة (اختيار عنصر مستهدف، وعرض خيارين بالأسفل أحدهما مطابق)
        function generateNewRound() {
            if (timeLeft <= 0) return;
            
            canClick = true;
            
            // إعادة ضبط ستايلات الكروت وتفتيح ألوانها
            optionButtons.forEach(btn => {
                btn.className = "bounce-active bg-amber-50 hover:bg-amber-100 active:bg-amber-200 border-4 border-amber-300 hover:border-amber-400 rounded-3xl p-4 flex flex-col items-center justify-center h-36 shadow-lg transition-all transform duration-200 relative overflow-hidden";
            });

            // اختيار عنصرين عشوائيين مختلفين بالكامل من الداتا
            const shuffled = [...gameItemsData].sort(() => 0.5 - Math.random());
            options = [shuffled[0], shuffled[1]];
            
            // تحديد المستهدف (الصورة الكبيرة في الأعلى)
            currentTargetItem = options[Math.floor(Math.random() * 2)];
            
            // تحديث البطاقة الكبيرة العلوية بالـ SVG
            targetSvgContainer.innerHTML = currentTargetItem.svg;
            
            // وضع الخيارات بالأسفل (أحدهما يطابق الصورة العلوية والآخر مختلف)
            optionSvgs[0].innerHTML = options[0].svg;
            optionSvgs[1].innerHTML = options[1].svg;
        }

        // التعامل مع نقر الطفل على أحد الكروت
        function handleOptionClick(index) {
            if (!canClick || timeLeft <= 0) return;
            canClick = false; // منع النقرات السريعة المتكررة

            const chosenItem = options[index];
            const clickedButton = optionButtons[index];
            
            // فحص هل الكارت المضغوط بالأسفل يطابق الكارت العلوي
            if (chosenItem.name === currentTargetItem.name) {
                // إجابة صحيحة! 🎉
                score += 1;
                scoreDisplay.textContent = score;
                playInteractiveSound('correct');
                
                // تأثير بصري أخضر رائع ومبهج
                clickedButton.className = "bg-emerald-100 border-4 border-emerald-500 rounded-3xl p-4 flex flex-col items-center justify-center h-36 shadow-lg transition-all relative overflow-hidden scale-105";
                
                showToast("رائع! متطابق تماماً ⭐", "bg-emerald-500 text-white");
            } else {
                // إجابة خاطئة ❌
                score = Math.max(0, score - 1); // لا تنزل النقاط عن الصفر
                scoreDisplay.textContent = score;
                playInteractiveSound('wrong');
                
                // تظليل الخيار الخاطئ باللون الأحمر الخفيف وإبراز الخيار الصحيح كدعم تعليمي
                clickedButton.className = "bg-rose-100 border-4 border-rose-500 rounded-3xl p-4 flex flex-col items-center justify-center h-36 shadow-lg transition-all relative overflow-hidden scale-95 opacity-80";
                
                const correctIndex = options.findIndex(item => item.name === currentTargetItem.name);
                optionButtons[correctIndex].className = "bg-emerald-50 border-4 border-emerald-400 rounded-3xl p-4 flex flex-col items-center justify-center h-36 shadow-lg transition-all relative overflow-hidden scale-105";

                showToast("حاول مرة أخرى! 💪", "bg-amber-500 text-white");
            }

            // انتظار ثانية ونصف ليعي الطفل النتيجة ويلاحظ الكارت المماثل قبل الانتقال للجولة التالية
            setTimeout(() => {
                generateNewRound();
            }, 1500);
        }

        // عرض إشعار تفاعلي سريع
        function showToast(text, colorClasses) {
            actionToast.textContent = text;
            actionToast.className = `opacity-100 transition-opacity duration-300 text-center text-lg font-black py-1.5 rounded-2xl mt-4 px-4 ${colorClasses} shadow`;
            
            setTimeout(() => {
                actionToast.className = "opacity-0 transition-opacity duration-300 text-center text-lg font-bold py-1.5 rounded-2xl mt-4";
            }, 1200);
        }

        // إنهاء الوقت وعرض النتيجة الإجمالية والتقييم اللفظي
        function endGame() {
            clearInterval(timerId);
            timerId = null;
            canClick = false;

            finalScore.textContent = score;
            
            // تحديد المستوى المطلوب بدقة بناءً على الأداء
            let ratingText = "";
            let ratingEmoji = "";
            let ratingColor = "";

            if (score >= 15) {
                ratingText = "ممتاز";
                ratingEmoji = "👑";
                ratingColor = "border-emerald-500 bg-emerald-50 text-emerald-600";
            } else if (score >= 11) {
                ratingText = "جيد جداً";
                ratingEmoji = "🏆";
                ratingColor = "border-sky-500 bg-sky-50 text-sky-600";
            } else if (score >= 8) {
                ratingText = "جيد";
                ratingEmoji = "🌟";
                ratingColor = "border-yellow-400 bg-yellow-50 text-yellow-600";
            } else if (score >= 5) {
                ratingText = "متوسط";
                ratingEmoji = "👍";
                ratingColor = "border-orange-400 bg-orange-50 text-orange-600";
            } else if (score >= 3) {
                ratingText = "ضعيف";
                ratingEmoji = "🌱";
                ratingColor = "border-amber-500 bg-amber-50 text-amber-700";
            } else {
                ratingText = "ضعيف جداً";
                ratingEmoji = "✏️";
                ratingColor = "border-rose-400 bg-rose-50 text-rose-500";
            }

            // تطبيق الهوية البصرية للتقييم
            feedbackEmoji.textContent = ratingEmoji;
            feedbackText.textContent = ratingText;
            feedbackBadge.className = `pop-effect w-48 h-48 rounded-full flex flex-col items-center justify-center mb-6 border-8 ${ratingColor}`;
            
            // عرض الشاشة النهائية للنتائج
            resultScreen.classList.remove('hidden');
        }

        // مستمعات الأحداث للنقر واللمس
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
        
        optionButtons[0].addEventListener('click', () => handleOptionClick(0));
        optionButtons[1].addEventListener('click', () => handleOptionClick(1));

    </script>
</body>
</html>
