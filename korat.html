<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة فرز الكرات</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --surface: #0f3460;
  --card: #1a2a4a;
  --border: #2a4a7a;
  --accent: #e94560;
  --text: #eaeaea;
  --muted: #7090b0;
  --tube-bg: rgba(255,255,255,0.04);
  --tube-border: rgba(255,255,255,0.15);
  --tube-w: 62px;
  --ball-size: 52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: 'Tajawal', sans-serif;
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(233,69,96,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(15,52,96,0.5) 0%, transparent 60%);
}

.wrap {
  width: 100%;
  max-width: 700px;
  padding: 18px 14px 30px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
}

/* Header */
.header { text-align: center; }
h1 {
  font-size: clamp(1.6rem, 5vw, 2.5rem);
  font-weight: 900;
  color: #fff;
  letter-spacing: 1px;
}
h1 span { color: var(--accent); }
.tagline { color: var(--muted); font-size: 0.85rem; margin-top: 3px; }

/* Top bar */
.topbar {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
}

.stat {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px 18px;
  text-align: center;
}
.stat-v { font-size: 1.4rem; font-weight: 900; color: var(--accent); line-height: 1; }
.stat-l { font-size: 0.72rem; color: var(--muted); }

.btn {
  padding: 9px 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-family: 'Tajawal', sans-serif;
  font-weight: 700;
  font-size: 0.9rem;
  transition: all 0.2s;
}
.btn-red { background: var(--accent); color: #fff; }
.btn-red:hover { background: #ff6080; transform: translateY(-1px); }
.btn-ghost { background: var(--card); border: 1px solid var(--border); color: var(--text); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

/* Difficulty */
.diff-row {
  display: flex; gap: 6px; align-items: center;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 6px 12px;
}
.diff-row span { color: var(--muted); font-size: 0.82rem; }
.diff-btn {
  padding: 4px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: 'Tajawal', sans-serif;
  font-size: 0.82rem;
  transition: all 0.15s;
}
.diff-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Message */
.msg {
  font-size: 0.88rem;
  color: var(--muted);
  min-height: 20px;
  text-align: center;
  transition: color 0.2s;
}
.msg.err { color: #ff7070; }
.msg.ok  { color: #70e0a0; }

/* Game area */
.game-area {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px 16px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  min-height: 300px;
}

.tubes-container {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: center;
  align-items: flex-end;
}

/* Tube */
.tube {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  gap: 2px;
  position: relative;
  padding-top: 10px;
}

.tube-inner {
  width: var(--tube-w);
  display: flex;
  flex-direction: column-reverse;
  align-items: center;
  background: var(--tube-bg);
  border: 2px solid var(--tube-border);
  border-top: none;
  border-radius: 0 0 34px 34px;
  padding: 6px 5px 8px;
  gap: 3px;
  position: relative;
  transition: border-color 0.2s, box-shadow 0.2s;
  min-height: 80px;
}

.tube.selected .tube-inner {
  border-color: #ffe066;
  box-shadow: 0 0 18px rgba(255,224,102,0.4);
}

.tube.valid .tube-inner {
  border-color: #70e0a0;
  box-shadow: 0 0 14px rgba(112,224,160,0.3);
  animation: pulse-green 1s infinite;
}

@keyframes pulse-green {
  0%,100% { box-shadow: 0 0 14px rgba(112,224,160,0.3); }
  50%      { box-shadow: 0 0 22px rgba(112,224,160,0.6); }
}

.tube.done .tube-inner {
  border-color: #60d0ff;
  box-shadow: 0 0 18px rgba(96,208,255,0.35);
}

/* Tube cap (open top) */
.tube-inner::before {
  content: '';
  position: absolute;
  top: -2px; left: -2px; right: -2px;
  height: 10px;
  border-right: 2px solid var(--tube-border);
  border-left: 2px solid var(--tube-border);
}
.tube.selected .tube-inner::before { border-color: #ffe066; }
.tube.valid .tube-inner::before { border-color: #70e0a0; }
.tube.done .tube-inner::before { border-color: #60d0ff; }

/* Ball */
.ball {
  width: var(--ball-size);
  height: var(--ball-size);
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
  transition: transform 0.15s;
}
.ball::after {
  content: '';
  position: absolute;
  top: 18%;
  left: 20%;
  width: 28%;
  height: 22%;
  background: rgba(255,255,255,0.45);
  border-radius: 50%;
  transform: rotate(-30deg);
}

.tube:hover .ball:last-child { transform: translateY(-4px); }

/* Floating ball (selected top) */
.floating-ball {
  position: absolute;
  top: -60px;
  left: 50%;
  transform: translateX(-50%);
  width: var(--ball-size);
  height: var(--ball-size);
  border-radius: 50%;
  z-index: 10;
  pointer-events: none;
  animation: float-up 0.25s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.floating-ball::after {
  content: '';
  position: absolute;
  top: 18%; left: 20%;
  width: 28%; height: 22%;
  background: rgba(255,255,255,0.45);
  border-radius: 50%;
  transform: rotate(-30deg);
}

@keyframes float-up {
  from { top: -10px; opacity: 0.5; }
  to   { top: -60px; opacity: 1; }
}

/* Win screen */
.win-overlay {
  position: fixed; inset: 0;
  background: rgba(10,10,20,0.88);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  backdrop-filter: blur(8px);
  animation: fadeIn 0.35s;
}
.win-overlay.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.win-card {
  background: var(--card);
  border: 1px solid var(--accent);
  border-radius: 24px;
  padding: 36px 44px;
  text-align: center;
  box-shadow: 0 0 60px rgba(233,69,96,0.3);
  animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes pop { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.win-emoji { font-size: 3.5rem; margin-bottom: 10px; }
.win-title { font-size: 2rem; font-weight: 900; color: var(--accent); margin-bottom: 6px; }
.win-info  { color: var(--muted); margin-bottom: 22px; font-size: 0.95rem; }

@media (max-width: 480px) {
  :root { --tube-w: 50px; --ball-size: 42px; }
  .tubes-container { gap: 8px; }
}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>🎨 فرز <span>الكرات</span></h1>
    <div class="tagline">رتّب الكرات حتى يكون كل أنبوب لون واحد فقط</div>
  </div>

  <div class="topbar">
    <div class="stat"><div class="stat-v" id="movesEl">0</div><div class="stat-l">حركات</div></div>
    <div class="stat"><div class="stat-v" id="timerEl">00:00</div><div class="stat-l">الوقت</div></div>
    <div class="diff-row">
      <span>الصعوبة:</span>
      <button class="diff-btn active" onclick="setDiff(this,3,4)">سهل</button>
      <button class="diff-btn" onclick="setDiff(this,5,6)">متوسط</button>
      <button class="diff-btn" onclick="setDiff(this,7,8)">صعب</button>
    </div>
    <button class="btn btn-red" onclick="newGame()">🔀 جديدة</button>
    <button class="btn btn-ghost" onclick="undoMove()">↩ تراجع</button>
  </div>

  <div class="msg" id="msg">انقر على أنبوب لتحديد الكرة العلوية، ثم اختر وجهتها</div>

  <div class="game-area">
    <div class="tubes-container" id="tubesContainer"></div>
  </div>
</div>

<div class="win-overlay hidden" id="winOverlay">
  <div class="win-card">
    <div class="win-emoji">🏆</div>
    <div class="win-title">رائع! فزت!</div>
    <div class="win-info" id="winInfo"></div>
    <button class="btn btn-red" onclick="newGame(); document.getElementById('winOverlay').classList.add('hidden')">العب مجدداً</button>
  </div>
</div>

<script>
// Color palette: [bg gradient stop1, stop2, name]
const COLORS = [
  ['#e74c3c','#c0392b','أحمر'],
  ['#3498db','#2980b9','أزرق'],
  ['#2ecc71','#27ae60','أخضر'],
  ['#f39c12','#e67e22','برتقالي'],
  ['#9b59b6','#8e44ad','بنفسجي'],
  ['#1abc9c','#16a085','فيروزي'],
  ['#e91e63','#c2185b','وردي'],
  ['#607d8b','#455a64','رمادي'],
];

let numColors = 3;
let numEmpty = 1; // extra empty tubes
let tubeCapacity = 4;
let tubes = [];
let selected = null;
let moves = 0;
let history = [];
let timerInterval = null;
let startTime = null;

function setDiff(btn, nc, ne_and_cap) {
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  // ne_and_cap: easy=4colors+1empty, med=5c+1e, hard=7c+2e
  if (nc === 3) { numColors = 3; numEmpty = 1; tubeCapacity = 4; }
  else if (nc === 5) { numColors = 5; numEmpty = 1; tubeCapacity = 4; }
  else { numColors = 7; numEmpty = 2; tubeCapacity = 4; }
  newGame();
}

function newGame() {
  clearInterval(timerInterval);
  startTime = null;
  moves = 0;
  selected = null;
  history = [];
  document.getElementById('movesEl').textContent = '0';
  document.getElementById('timerEl').textContent = '00:00';
  document.getElementById('winOverlay').classList.add('hidden');

  // Build and shuffle
  let balls = [];
  for (let c = 0; c < numColors; c++)
    for (let i = 0; i < tubeCapacity; i++)
      balls.push(c);

  // Shuffle
  for (let i = balls.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [balls[i], balls[j]] = [balls[j], balls[i]];
  }

  tubes = [];
  for (let t = 0; t < numColors; t++) {
    tubes.push(balls.splice(0, tubeCapacity));
  }
  for (let e = 0; e < numEmpty; e++) tubes.push([]);

  render();
  setMsg('انقر على أنبوب لتحديد الكرة العلوية', '');
}

function undoMove() {
  if (!history.length) return setMsg('لا توجد حركات للتراجع!', 'err');
  const {from, to} = history.pop();
  tubes[from].push(tubes[to].pop());
  moves = Math.max(0, moves - 1);
  selected = null;
  document.getElementById('movesEl').textContent = moves;
  render();
  setMsg('تم التراجع', 'ok');
}

function clickTube(idx) {
  if (selected === null) {
    if (!tubes[idx].length) return setMsg('هذا الأنبوب فارغ!', 'err');
    selected = idx;
    render();
    const c = tubes[idx][tubes[idx].length - 1];
    setMsg(`تم تحديد كرة ${COLORS[c][2]} — اختر الأنبوب الهدف`, 'ok');
  } else {
    if (selected === idx) {
      selected = null;
      render();
      setMsg('تم إلغاء التحديد', '');
      return;
    }
    const from = selected, to = idx;
    if (!canMove(from, to)) {
      setMsg('لا يمكن نقل الكرة هنا!', 'err');
      selected = null;
      render();
      return;
    }
    if (!startTime) {
      startTime = Date.now();
      timerInterval = setInterval(tickTimer, 500);
    }
    history.push({from, to});
    tubes[to].push(tubes[from].pop());
    moves++;
    selected = null;
    document.getElementById('movesEl').textContent = moves;
    render();
    setMsg('حركة ممتازة! 👍', 'ok');
    checkWin();
  }
}

function canMove(from, to) {
  if (!tubes[from].length) return false;
  if (tubes[to].length >= tubeCapacity) return false;
  if (!tubes[to].length) return true;
  return tubes[from][tubes[from].length-1] === tubes[to][tubes[to].length-1];
}

function isTubeDone(t) {
  if (tubes[t].length !== tubeCapacity) return false;
  return tubes[t].every(c => c === tubes[t][0]);
}

function checkWin() {
  const colorTubesDone = tubes.filter((t,i) => t.length === tubeCapacity && isTubeDone(i)).length;
  if (colorTubesDone === numColors) {
    clearInterval(timerInterval);
    const elapsed = getElapsed();
    document.getElementById('winInfo').textContent = `أنجزت بـ ${moves} حركة في ${elapsed}`;
    setTimeout(() => document.getElementById('winOverlay').classList.remove('hidden'), 500);
  }
}

function getElapsed() {
  if (!startTime) return '00:00';
  const s = Math.floor((Date.now() - startTime) / 1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

function tickTimer() {
  document.getElementById('timerEl').textContent = getElapsed();
}

function render() {
  const container = document.getElementById('tubesContainer');
  container.innerHTML = '';
  tubes.forEach((tube, idx) => {
    const div = document.createElement('div');
    div.className = 'tube';
    if (selected === idx) div.classList.add('selected');
    else if (selected !== null && canMove(selected, idx)) div.classList.add('valid');
    if (isTubeDone(idx)) div.classList.add('done');
    div.onclick = () => clickTube(idx);

    // Floating ball above selected
    if (selected === idx && tube.length) {
      const fb = document.createElement('div');
      fb.className = 'floating-ball';
      const c = tube[tube.length - 1];
      fb.style.background = `radial-gradient(circle at 35% 35%, ${COLORS[c][0]}, ${COLORS[c][1]})`;
      div.appendChild(fb);
    }

    const inner = document.createElement('div');
    inner.className = 'tube-inner';

    // Render balls (bottom to top = index 0 to end, but column-reverse shows them correctly)
    const displayTube = selected === idx ? tube.slice(0, -1) : tube;
    displayTube.forEach(c => {
      const ball = document.createElement('div');
      ball.className = 'ball';
      ball.style.background = `radial-gradient(circle at 35% 35%, ${COLORS[c][0]}, ${COLORS[c][1]})`;
      ball.style.boxShadow = `0 3px 10px rgba(0,0,0,0.4), 0 1px 3px rgba(0,0,0,0.3)`;
      inner.appendChild(ball);
    });

    div.appendChild(inner);
    container.appendChild(div);
  });
}

function setMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg' + (type ? ' ' + type : '');
}

newGame();
</script>
</body>
</html>
